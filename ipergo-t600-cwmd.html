function money(value, lang = 'th'){
  const number = Number(value || 0);
  const text = RESULT_TEXT[lang] || RESULT_TEXT.th;
  return Math.round(number).toLocaleString(text.locale) + ' ' + text.currency;
}
function getEl(id){ return document.getElementById(id); }
function getResultText(){
  return RESULT_TEXT[resultLanguage] || RESULT_TEXT.th;
}
function getSystemLabel(system){
  return resultLanguage === 'en' ? (system.label || system.labelTh) : (system.labelTh || system.label);
}
function getDimensionText(item){
  return resultLanguage === 'en' ? (item.label || item.copyDimensionsText || item.dimensionsText) : (item.copyDimensionsText || item.dimensionsText || item.label);
}
function getPostText(item){
  if (!item.postText) return '';
  if (resultLanguage !== 'en') return item.postText;
  const match = String(item.postText).match(/\d+/);
  return match ? match[0] + ' posts' : item.postText;
}
function getLocalizedNote(note){
  if (resultLanguage !== 'en') return note;
  return String(note || '')
    .split('\u0e1a\u0e32\u0e17').join('THB')
    .split('\u0e23\u0e35\u0e42\u0e21\u0e17').join('remote')
    .split('\u0e27\u0e31\u0e19').join('days');
}
function setResultLanguage(lang){
  resultLanguage = lang === 'en' ? 'en' : 'th';
  document.querySelectorAll('[data-result-lang]').forEach(button => {
    const active = button.dataset.resultLang === resultLanguage;
    button.classList.toggle('active', active);
    button.setAttribute('aria-pressed', String(active));
  });
  calculate();
}
function fillSelect(el, options, valueKey='value', labelKey='label'){
  el.innerHTML = '';
  options.forEach(option => {
    const node = document.createElement('option');
    node.value = option[valueKey];
    node.textContent = option[labelKey];
    el.appendChild(node);
  });
}
function init(){
  fillSelect(getEl('sizeSelect'), SIZES.map((item, index)=>({value:String(index), label:item.label + ' - ' + money(item.price || (item.prices && item.prices[PRODUCT.defaultSystem || SYSTEMS[0].id]) || 0)})));
  fillSelect(getEl('systemSelect'), SYSTEMS.map(s=>({value:s.id,label:(s.labelTh || s.label)})));
  if (PRODUCT.defaultSystem) getEl('systemSelect').value = PRODUCT.defaultSystem;
  if (SYSTEMS.length <= 1) getEl('systemWrap').style.display = 'none';
  fillSelect(getEl('frameColor'), (PRODUCT.frameColors || ['Standard']).map(x=>({value:x,label:x})));
  const fabricOptions = PRODUCT.fabricOptions || [];
  if (fabricOptions.length){
    fillSelect(getEl('fabricOption'), fabricOptions.map(x=>({value:x,label:x})));
  } else {
    getEl('fabricWrap').style.display = 'none';
  }
  document.querySelectorAll('input,select,textarea').forEach(el=>{
    el.addEventListener('input', calculate);
    el.addEventListener('change', calculate);
  });
  document.querySelectorAll('[data-result-lang]').forEach(button => {
    button.addEventListener('click', () => setResultLanguage(button.dataset.resultLang));
  });
  calculate();
}
function getSelectedSystem(){
  const systemId = getEl('systemSelect').value || SYSTEMS[0].id;
  return SYSTEMS.find(s=>s.id === systemId) || SYSTEMS[0];
}
function getSelectedItem(){
  const index = Number(getEl('sizeSelect').value || 0);
  return SIZES[index];
}
function calculate(){
  const text = getResultText();
  const item = getSelectedItem();
  const system = getSelectedSystem();
  const qty = Math.max(1, Math.floor(Number(getEl('qty').value || 1)));
  const discountPercent = Math.min(100, Math.max(0, Number(getEl('discountPercent').value || 0)));
  const specialDiscount = Math.max(0, Number(getEl('specialDiscount').value || 0));
  const frameColor = getEl('frameColor').value;
  const fabric = PRODUCT.fabricOptions && PRODUCT.fabricOptions.length ? getEl('fabricOption').value : '';
  const customNote = getEl('customNote').value.trim();
  getEl('resultHeading').textContent = text.heading;

  if (!item){
    getEl('quoteTitle').textContent = PRODUCT.title;
    getEl('finalPrice').textContent = '';
    getEl('resultLines').innerHTML = '<span class="warn">' + escapeHtml(text.missingItem) + '</span>';
    getEl('standardNotes').innerHTML = '';
    getEl('copyText').value = '';
    return;
  }

  const unitPrice = Number(item.price || (item.prices && item.prices[system.id]) || 0);
  if (!unitPrice){
    getEl('quoteTitle').textContent = PRODUCT.title;
    getEl('finalPrice').textContent = '';
    getEl('resultLines').innerHTML = '<span class="warn">' + escapeHtml(text.missingPrice) + '</span>';
    getEl('standardNotes').innerHTML = '';
    getEl('copyText').value = '';
    return;
  }

  const subtotal = unitPrice * qty;
  const subtotalAfterSpecial = Math.max(0, subtotal - specialDiscount);
  const discountAmount = subtotalAfterSpecial * discountPercent / 100;
  const finalTotal = Math.max(0, subtotalAfterSpecial - discountAmount);
  getEl('quoteTitle').textContent = PRODUCT.title;
  getEl('finalPrice').textContent = money(finalTotal, resultLanguage);

  const lines = [];
  lines.push(text.product + ': ' + PRODUCT.title);
  lines.push(text.model + ': ' + PRODUCT.subtitle);
  lines.push(text.system + ': ' + getSystemLabel(system));
  lines.push(text.size + ': ' + getDimensionText(item));
  if (item.heightText) lines.push(text.height + ': ' + item.heightText);
  if (item.postText) lines.push(text.posts + ': ' + getPostText(item));
  if (item.bayText) lines.push('Bay: ' + item.bayText);
  if (item.extraText) lines.push(text.extra + ': ' + item.extraText);
  lines.push(text.frameColor + ': ' + frameColor);
  if (fabric) lines.push(text.fabric + ': ' + fabric);
  lines.push(text.quantity + ': ' + qty.toLocaleString(text.locale) + ' ' + text.setUnit);
  lines.push(text.unitPrice + ': ' + money(unitPrice, resultLanguage));
  if (qty > 1 || discountPercent > 0 || specialDiscount > 0) {
    lines.push(text.beforeDiscount + ': ' + money(subtotal, resultLanguage));
  }
  if (specialDiscount > 0) {
    lines.push(text.specialDiscount + ': ' + money(specialDiscount, resultLanguage));
  }
  if (discountPercent > 0) {
    lines.push(text.discount + ' (' + discountPercent.toLocaleString(text.locale) + '%): ' + money(discountAmount, resultLanguage));
  }
  if (discountPercent > 0 || specialDiscount > 0) {
    lines.push(text.netTotal + ': ' + money(finalTotal, resultLanguage));
  } else {
    lines.push(text.total + ': ' + money(finalTotal, resultLanguage));
  }
  if (customNote) {
    lines.push('');
    lines.push(text.note + ': ' + customNote);
  }

  const noteLines = [text.priceNotes + ':'].concat((PRODUCT.notes || []).map(note => '- ' + getLocalizedNote(note)));
  getEl('resultLines').textContent = lines.join('\n');
  getEl('standardNotes').innerHTML = '<span class="pill">' + escapeHtml(text.priceNotes) + '</span><ul>' + (PRODUCT.notes || []).map(note => '<li>' + escapeHtml(getLocalizedNote(note)) + '</li>').join('') + '</ul>';
  getEl('copyText').value = lines.concat([''], noteLines).join('\n').trim();
}
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]));
}
async function copyQuotation(){
  const text = getEl('copyText').value;
  if (!text) return alert('ไม่มีข้อความสำหรับคัดลอก');
  try{
    await navigator.clipboard.writeText(text);
    alert('คัดลอกข้อความแล้ว');
  }catch(error){
    getEl('copyText').hidden = false;
    getEl('copyText').select();
    alert('Copy อัตโนมัติไม่สำเร็จ กรุณาคัดลอกจากกล่องข้อความด้านล่าง');
  }
}
function resetForm(){
  getEl('sizeSelect').selectedIndex = 0;
  getEl('systemSelect').value = PRODUCT.defaultSystem || SYSTEMS[0].id;
  getEl('frameColor').selectedIndex = 0;
  if (PRODUCT.fabricOptions && PRODUCT.fabricOptions.length) getEl('fabricOption').selectedIndex = 0;
  getEl('qty').value = 1;
  getEl('discountPercent').value = 0;
  getEl('specialDiscount').value = 0;
  getEl('customNote').value = '';
  calculate();
}
window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
