Pre-order product: approximately 90-120 days lead time."]};
const SIZES = PRODUCT.items || [];
const SYSTEMS = PRODUCT.systemOptions || [{id:'single', label:PRODUCT.systemText || 'Motorized', labelTh:PRODUCT.systemText || 'ระบบมอเตอร์'}];

function money(value){
  const number = Number(value || 0);
  return Math.round(number).toLocaleString('th-TH') + ' บาท';
}
function getEl(id){ return document.getElementById(id); }
function fillSelect(el, options, valueKey='value', labelKey='label'){
  el.innerHTML = '';
  options.forEach(option => {
    const node = document.createElement('option');
    node.value = option[valueKey];
    node.textContent = option[labelKey];
    el.appendChild(node);
  });
}
function init(){
  fillSelect(getEl('sizeSelect'), SIZES.map((item, index)=>({value:String(index), label:item.label + ' - ' + money(item.price || (item.prices && item.prices[PRODUCT.defaultSystem || SYSTEMS[0].id]) || 0)})));
  fillSelect(getEl('systemSelect'), SYSTEMS.map(s=>({value:s.id,label:(s.labelTh || s.label)})));
  if (PRODUCT.defaultSystem) getEl('systemSelect').value = PRODUCT.defaultSystem;
  if (SYSTEMS.length <= 1) getEl('systemWrap').style.display = 'none';
  fillSelect(getEl('frameColor'), (PRODUCT.frameColors || ['Standard']).map(x=>({value:x,label:x})));
  const fabricOptions = PRODUCT.fabricOptions || [];
  if (fabricOptions.length){
    fillSelect(getEl('fabricOption'), fabricOptions.map(x=>({value:x,label:x})));
  } else {
    getEl('fabricWrap').style.display = 'none';
  }
  document.querySelectorAll('input,select,textarea').forEach(el=>{
    el.addEventListener('input', calculate);
    el.addEventListener('change', calculate);
  });
  calculate();
}
function getSelectedSystem(){
  const systemId = getEl('systemSelect').value || SYSTEMS[0].id;
  return SYSTEMS.find(s=>s.id === systemId) || SYSTEMS[0];
}
function getSelectedItem(){
  const index = Number(getEl('sizeSelect').value || 0);
  return SIZES[index];
}
function calculate(){
  const item = getSelectedItem();
  const system = getSelectedSystem();
  const qty = Math.max(1, Math.floor(Number(getEl('qty').value || 1)));
  const discountPercent = Math.min(100, Math.max(0, Number(getEl('discountPercent').value || 0)));
  const specialDiscount = Math.max(0, Number(getEl('specialDiscount').value || 0));
  const frameColor = getEl('frameColor').value;
  const fabric = PRODUCT.fabricOptions && PRODUCT.fabricOptions.length ? getEl('fabricOption').value : '';
  const customNote = getEl('customNote').value.trim();

  if (!item){
    getEl('quoteTitle').textContent = PRODUCT.title;
    getEl('finalPrice').textContent = '';
    getEl('resultLines').innerHTML = '<span class="warn">ไม่พบราคาสำหรับขนาดนี้ กรุณาตรวจสอบตารางราคา</span>';
    getEl('copyText').value = '';
    return;
  }

  const unitPrice = Number(item.price || (item.prices && item.prices[system.id]) || 0);
  if (!unitPrice){
    getEl('quoteTitle').textContent = PRODUCT.title;
    getEl('finalPrice').textContent = '';
    getEl('resultLines').innerHTML = '<span class="warn">ไม่พบราคาสำหรับระบบหรือขนาดนี้ กรุณาตรวจสอบตารางราคา</span>';
    getEl('copyText').value = '';
    return;
  }

  const subtotal = unitPrice * qty;
  const subtotalAfterSpecial = Math.max(0, subtotal - specialDiscount);
  const discountAmount = subtotalAfterSpecial * discountPercent / 100;
  const finalTotal = Math.max(0, subtotalAfterSpecial - discountAmount);
  getEl('quoteTitle').textContent = PRODUCT.title;
  getEl('finalPrice').textContent = money(finalTotal);

  const lines = [];
  lines.push('สินค้า: ' + PRODUCT.title);
  lines.push('รุ่น/แบบ: ' + PRODUCT.subtitle);
  lines.push('ระบบ: ' + (system.labelTh || system.label));
  lines.push('ขนาด: ' + (item.copyDimensionsText || item.dimensionsText || item.label));
  if (item.heightText) lines.push('ความสูง: ' + item.heightText);
  if (item.postText) lines.push('จำนวนเสา: ' + item.postText);
  if (item.bayText) lines.push('Bay: ' + item.bayText);
  if (item.extraText) lines.push('รายละเอียดเพิ่มเติม: ' + item.extraText);
  lines.push('สีโครง: ' + frameColor);
  if (fabric) lines.push('ผ้า: ' + fabric);
  lines.push('จำนวน: ' + qty + ' ชุด');
  lines.push('ราคาต่อชุด: ' + money(unitPrice));
  if (qty > 1 || discountPercent > 0 || specialDiscount > 0) {
    lines.push('ราคาก่อนส่วนลด: ' + money(subtotal));
  }
  if (specialDiscount > 0) {
    lines.push('ส่วนลดพิเศษ: ' + money(specialDiscount));
  }
  if (discountPercent > 0) {
    lines.push('ส่วนลด (' + discountPercent.toLocaleString('th-TH') + '%): ' + money(discountAmount));
  }
  if (discountPercent > 0 || specialDiscount > 0) {
    lines.push('ราคารวมสุทธิ: ' + money(finalTotal));
  } else {
    lines.push('ราคารวม: ' + money(finalTotal));
  }
  if (customNote) {
    lines.push('');
    lines.push('หมายเหตุ: ' + customNote);
  }

  const noteLines = ['หมายเหตุจากใบราคา:'].concat((PRODUCT.notes || []).map(note => '- ' + note));
  getEl('resultLines').textContent = lines.join('\n');
  getEl('standardNotes').innerHTML = '<span class="pill">หมายเหตุจากใบราคา</span><ul>' + (PRODUCT.notes || []).map(note => '<li>' + escapeHtml(note) + '</li>').join('') + '</ul>';
  getEl('copyText').value = lines.concat([''], noteLines).join('\n').trim();
}
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]));
}
async function copyQuotation(){
  const text = getEl('copyText').value;
  if (!text) return alert('ไม่มีข้อความสำหรับคัดลอก');
  try{
    await navigator.clipboard.writeText(text);
    alert('คัดลอกข้อความแล้ว');
  }catch(error){
    getEl('copyText').hidden = false;
    getEl('copyText').select();
    alert('Copy อัตโนมัติไม่สำเร็จ กรุณาคัดลอกจากกล่องข้อความด้านล่าง');
  }
}
function resetForm(){
  getEl('sizeSelect').selectedIndex = 0;
  getEl('systemSelect').value = PRODUCT.defaultSystem || SYSTEMS[0].id;
  getEl('frameColor').selectedIndex = 0;
  if (PRODUCT.fabricOptions && PRODUCT.fabricOptions.length) getEl('fabricOption').selectedIndex = 0;
  getEl('qty').value = 1;
  getEl('discountPercent').value = 0;
  getEl('specialDiscount').value = 0;
  getEl('customNote').value = '';
  calculate();
}
window.addEventListener('DOMContentLoaded', init);
</script>
