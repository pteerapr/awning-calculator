<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- App icon: a striped awning. Replace with your own logo anytime. -->
  <rect width="512" height="512" rx="96" fill="#003366"/>

  <!-- mounting bar -->
  <rect x="84" y="120" width="344" height="34" rx="10" fill="#ffffff"/>

  <!-- striped canopy with a scalloped bottom edge -->
  <clipPath id="canopy">
    <path d="M96 154 H416 V300
             q-20 26 -40 0 q-20 26 -40 0 q-20 26 -40 0 q-20 26 -40 0
             q-20 26 -40 0 q-20 26 -40 0 q-20 26 -40 0 q-20 26 -40 0 Z"/>
  </clipPath>
  <g clip-path="url(#canopy)">
    <rect x="96"  y="154" width="40" height="170" fill="#e23b3b"/>
    <rect x="136" y="154" width="40" height="170" fill="#ffffff"/>
    <rect x="176" y="154" width="40" height="170" fill="#e23b3b"/>
    <rect x="216" y="154" width="40" height="170" fill="#ffffff"/>
    <rect x="256" y="154" width="40" height="170" fill="#e23b3b"/>
    <rect x="296" y="154" width="40" height="170" fill="#ffffff"/>
    <rect x="336" y="154" width="40" height="170" fill="#e23b3b"/>
    <rect x="376" y="154" width="40" height="170" fill="#ffffff"/>
  </g>

  <!-- support arms -->
  <rect x="120" y="300" width="14" height="92" rx="6" fill="#cbd5e1"/>
  <rect x="378" y="300" width="14" height="92" rx="6" fill="#cbd5e1"/>
</svg>
